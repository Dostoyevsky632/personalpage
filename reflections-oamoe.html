    }
    .meta {

      color: var(--muted);
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--rule);
    }
    .reflection-body h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      margin: 2.5rem 0 1rem;
      letter-spacing: -0.01em;
    }
    .reflection-body p {
      font-weight: 300;
      font-size: 1.02rem;
      color: #444;
      margin-bottom: 1.2rem;
    }
    .placeholder {
      background: var(--card-bg);
      border: 1px dashed var(--rule);
      padding: 3rem 2rem;
      text-align: center;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
